<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Destiny 2 - Dial Interface</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <h1>KERREV, THE ERASED</h1>
  <h2>DIAL HELPER</h2>

  <div id="instructionsBox">
    <ol>
      <li>Click each dial slot and choose a symbol.</li>
      <li>Truth/Lie labels will update automatically.</li>
    </ol>
  </div>

  <div id="truthLieLabel">
    <div id="label-left"></div>
    <div></div>
    <div id="label-right"></div>
  </div>

  <div class="dial-wrapper">
    <div class="dial">
      <div class="dial-slot left1" data-position="left1" onclick="handleSlotClick(this)"></div>
      <div class="dial-slot left2" data-position="left2" onclick="handleSlotClick(this)"></div>
      <div class="dial-slot left3" data-position="left3" onclick="handleSlotClick(this)"></div>
      <div class="dial-slot right1" data-position="right1" onclick="handleSlotClick(this)"></div>
      <div class="dial-slot right2" data-position="right2" onclick="handleSlotClick(this)"></div>
      <div class="dial-slot right3" data-position="right3" onclick="handleSlotClick(this)"></div>
    </div>
  </div>

  <div class="symbol-popup" id="symbolPopup">
    <div class="symbol-grid" id="popupGrid"></div>
  </div>

  <script src="./js/logic.js"></script>
  <script src="./js/map_logic.js"></script>
</body>
</html>
