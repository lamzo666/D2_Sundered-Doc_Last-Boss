<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kerrev, The Erased - Dial Helper</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Manrope:wght@300;700&display=swap" rel="stylesheet" />
  <style>
    body {
      background-color: #111;
      background-image: url('./img/background_wallaper_blur.jpg');
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: white;
      font-family: 'Open Sans', sans-serif;
      text-align: center;
      margin: 0;
    }
    h1 {
      font-family: 'Manrope', sans-serif;
      font-weight: 700;
      font-size: 2.2em;
      text-shadow: 0 0 10px #ff0044, 0 0 20px #ff0044, 0 0 40px #ff0044;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin: 20px 0 5px;
    }
    h2 {
      font-family: 'Manrope', sans-serif;
      font-weight: 300;
      font-size: 1.1em;
      letter-spacing: 1px;
      margin: 0 0 20px;
    }
    .dial-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
    }
    .dial {
      position: relative;
      width: 572px;
      height: 572px;
      background: url('./img/empty_dial.png') center center / contain no-repeat;
      background-size: contain;
    }
    .dial-slot {
      position: absolute;
      width: 80px;
      height: 80px;
      background-size: contain;
      background-repeat: no-repeat;
      border: 2px solid white;
      cursor: pointer;
      transition: box-shadow 0.2s ease;
      z-index: 2;
    }
    .dial-slot.left1 { top: 95px; left: 130px; }
    .dial-slot.left2 { top: 240px; left: 65px; }
    .dial-slot.left3 { top: 380px; left: 125px; }
    .dial-slot.right1 { top: 95px; right: 130px; }
    .dial-slot.right2 { top: 240px; right: 70px; }
    .dial-slot.right3 { top: 380px; right: 125px; }
    .symbol-popup {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #222;
      border: 2px solid #888;
      border-radius: 8px;
      padding: 20px;
      z-index: 999;
    }
    .symbol-grid {
      display: grid;
      grid-template-columns: repeat(4, 60px);
      gap: 10px;
      justify-content: center;
    }
    .symbol-option {
      width: 60px;
      height: 60px;
      background-size: contain;
      background-repeat: no-repeat;
      border: 2px solid white;
      cursor: pointer;
    }
    .btn-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
    }
    .btn-icon {
      width: 60px;
      height: 60px;
      border: none;
      border-radius: 12px;
      background-color: #003322;
      box-shadow: 0 0 8px #005f3c, 0 0 12px #005f3c;
      cursor: pointer;
    }
    .btn-icon.glow-phase {
      background-color: #006644;
      box-shadow: 0 0 12px #00ff99, 0 0 24px #00ff99;
    }
    .btn-icon img { width: 40px; height: 40px; }
    .btn-reset {
      background-color: #330011;
      box-shadow: 0 0 8px #660022, 0 0 12px #660022;
    }
    #truthLieLabel {
      min-height: 60px;
      margin: 20px auto 0 auto;
      width: 572px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      font-size: 2.6em;
      font-weight: bold;
      text-transform: uppercase;
      text-shadow: 0 0 4px #000, 0 0 10px #000, 0 0 20px #000;
    }
    .map-container {
      position: relative;
      max-width: 1000px;
      margin: auto;
    }
    .map-img {
      width: 100%;
      height: auto;
      display: block;
    }
    .map-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .symbol-overlay {
      position: absolute;
      width: 5%;
      aspect-ratio: 1 / 1;
      pointer-events: none;
      z-index: 2;
    }
    .pulse {
      animation: pulse 1.5s infinite;
      filter: drop-shadow(0 0 12px yellow);
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    #instructionsIcon {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1000;
      cursor: pointer;
    }
    #instructionsBox {
      display: none;
      position: fixed;
      top: 70px;
      left: 20px;
      background-color: rgba(0,0,0,0.8);
      color: white;
      padding: 10px;
      border-radius: 8px;
      max-width: 300px;
      text-align: left;
      z-index: 1001;
    }
  </style>
</head>
<body>
  <h1>KERREV, THE ERASED</h1>
  <h2>Sundered Doctrine<br>DIAL HELPER</h2>
  <img id="instructionsIcon" src="./img/notepad-48.png" alt="Instructions" onclick="toggleInstructions()">
  <div id="instructionsBox">
    <ol>
      <li>Click each dial slot and choose a symbol.</li>
      <li>Click Lock to enter illumination mode, then toggle the glowing ones.</li>
      <li>Click Lock again to confirm and view map.</li>
      <li>Click Reset to clear everything.</li>
    </ol>
  </div>
  <div id="truthLieLabel"></div>
  <div class="dial-wrapper">
    <div class="dial">
      <div class="dial-slot left1" data-position="left1"></div>
      <div class="dial-slot left2" data-position="left2"></div>
      <div class="dial-slot left3" data-position="left3"></div>
      <div class="dial-slot right1" data-position="right1"></div>
      <div class="dial-slot right2" data-position="right2"></div>
      <div class="dial-slot right3" data-position="right3"></div>
    </div>
  </div>
  <div class="btn-container">
    <button class="btn-icon" id="lockButton" onclick="handleLock()">
      <img src="./img/lock-50.png" alt="Lock">
    </button>
    <button class="btn-icon btn-reset" onclick="resetDial()">
      <img src="./img/reset-60.png" alt="Reset">
    </button>
  </div>
  <div class="symbol-popup" id="symbolPopup">
    <div class="symbol-grid" id="popupGrid"></div>
  </div>
  <div class="map-container">
    <img src="./img/map.jpg" alt="Map" class="map-img" />
    <div class="map-overlay" id="map-overlay"></div>
  </div>
  <script src="./js/logic.js"></script>
</body>
</html>
