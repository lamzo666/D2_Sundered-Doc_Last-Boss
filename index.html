<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Symbol Dial Map Interface</title>
  <style>
    body { background: #111; color: white; font-family: sans-serif; text-align: center; }
    .container { padding: 20px; }
    
  place-items: center;
}
    .symbol-grid {
      display: grid;
      grid-template-columns: repeat(2, 60px);
      grid-template-rows: repeat(7, 60px);
      gap: 6px;
      justify-content: center;
    }
    .symbol {
      width: 60px;
      height: 60px;
      background-size: contain;
      background-repeat: no-repeat;
      border: 2px solid white;
      cursor: pointer;
    }
    
  margin: 0 auto;
}
    .dial-base {
      background: url('./empty_dial.png') no-repeat center center / contain;
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    .dial-overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      background: url('./truth_lie.png') center center / contain no-repeat;
      opacity: 0.7;
      pointer-events: none;
      z-index: 1;
      transform: scaleX(1);
    }
    .dial-slot {
      position: absolute;
      width: 80px;
      height: 80px;
      background-size: contain;
      background-repeat: no-repeat;
      border: 2px solid white;
      cursor: pointer;
      transition: box-shadow 0.2s ease;
      z-index: 2;
    }
    .dial-slot.left1 { top: 120px; left: 50px; }
    .dial-slot.left2 { top: 250px; left: 10px; }
    .dial-slot.left3 { top: 400px; left: 50px; }
    .dial-slot.right1 { top: 120px; right: 50px; }
    .dial-slot.right2 { top: 250px; right: 10px; }
    .dial-slot.right3 { top: 400px; right: 50px; }
    .map-container {
      position: relative;
      max-width: 1000px;
      margin: auto;
    }
    .map-img { width: 100%; height: auto; display: block; }
    .map-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .symbol-overlay {
      position: absolute;
      width: 5%;
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      background: rgba(0,255,0,0.2);
      border: 2px solid transparent;
      transition: all 0.3s ease;
    }
    .symbol-overlay.pulse {
      animation: pulse 1.5s infinite;
      border-color: #00ff00;
      background-color: rgba(0,255,0,0.4);
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }
    button { margin: 10px; padding: 10px 20px; font-size: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Symbol Dial</h1>
    <div id="truthLieLabel" style="display: flex; justify-content: space-between; font-size: 1.5em; margin: 30px auto; font-weight: bold; width: 300px; text-shadow: 0 0 10px #000;"></div>
    <div class="dial-section" style="display: grid; grid-template-columns: auto 572px auto; gap: 40px; align-items: center; justify-content: center;">
      <div class="symbol-grid" id="left-symbols" style="display: grid; grid-template-columns: repeat(2, 60px); grid-template-rows: repeat(7, 60px); gap: 6px; justify-content: center;"></div>
      <div class="dial" style="position: relative; width: 572px; height: 572px; margin: 0 auto; background: url('./empty_dial.png') no-repeat center center / contain;">
        
        <div class="dial-slot left1" data-position="left1"></div>
        <div class="dial-slot left2" data-position="left2"></div>
        <div class="dial-slot left3" data-position="left3"></div>
        <div class="dial-slot right1" data-position="right1"></div>
        <div class="dial-slot right2" data-position="right2"></div>
        <div class="dial-slot right3" data-position="right3"></div>
      </div>
      <div class="symbol-grid" id="right-symbols" style="display: grid; grid-template-columns: repeat(2, 60px); grid-template-rows: repeat(7, 60px); gap: 6px; justify-content: center;"></div>
    </div>
    <button onclick="lockInSymbols()">Lock In</button>
    <button onclick="resetDial()">Reset</button>
    <h2>Map</h2>
    <div class="map-container">
      <img src="./map.jpg" alt="Map" class="map-img" />
      <div class="map-overlay" id="map-overlay"></div>
    </div>
  </div>
  <script>
    const truthCombinations = [
  ['pyramid','drink','worm'], ['pyramid','kill','worm'], ['pyramid','stop','savathun'], ['pyramid','give','darkness'],
  ['guardian','worship','light'], ['guardian','worship','traveller'], ['guardian','kill','witness'], ['traveller','give','guardian'],
  ['traveller','give','light'], ['hive','worship','darkness'], ['hive','worship','worm'], ['darkness','stop','savathun']
];
    const lieCombinations = [
  ['hive','kill','worm'], ['hive','kill','light'], ['hive','give','darkness'], ['hive','stop','witness'],
  ['traveller','kill','guardian'], ['traveller','drink','worm'], ['traveller','give','hive'], ['traveller','stop','witness'],
  ['pyramid','stop','witness'], ['witness','drink','light'], ['witness','kill','pyramid'], ['guardian','worship','witness'],
  ['guardian','kill','traveller'], ['savathun','drink','darkness'], ['savathun','stop','darkness'], ['light','stop','savathun']
];
    const symbolPositions = {
  'give': { top: '31.73%', left: '42.19%' }, 'savathun': { top: '5.12%', left: '75.2%' }, 'pyramid': { top: '63.15%', left: '6.25%' },
  'drink': { top: '31.63%', left: '53.71%' }, 'guardian': { top: '64.28%', left: '21.97%' }, 'witness': { top: '64.07%', left: '54.93%' },
  'kill': { top: '68.37%', left: '66.31%' }, 'worm': { top: '4.81%', left: '70.7%' }, 'traveller': { top: '75.74%', left: '19.58%' },
  'worship': { top: '50.67%', left: '52.98%' }, 'stop': { top: '18.83%', left: '41.06%' }, 'hive': { top: '9.93%', left: '26.12%' },
  'light': { top: '73.18%', left: '59.57%' }, 'darkness': { top: '49.95%', left: '60.06%' }
};

    function pulseMapSymbols(symbolsToHighlight) {
  const overlay = document.getElementById('map-overlay');
  overlay.innerHTML = '';
  Object.entries(symbolPositions).forEach(([name, pos]) => {
    const div = document.createElement('div');
    div.className = 'symbol-overlay';
    div.style.top = pos.top;
    div.style.left = pos.left;
    div.dataset.symbol = name;
    if (symbolsToHighlight.includes(name)) div.classList.add('pulse');
    overlay.appendChild(div);
  });
}
    function getSymbolsFromSlots(group) {
  const positions = group === 'left' ? ['left1','left2','left3'] : ['right1','right2','right3'];
  return positions.map(pos => {
    const el = document.querySelector(`.dial-slot.${pos}`);
    const match = el.style.backgroundImage.match(/\/([^\/]+)\.png/);
    return match ? match[1].replace('.png','') : null;
  });
}
    function lockInSymbols() {
  const left = getSymbolsFromSlots('left').sort();
  const right = getSymbolsFromSlots('right').sort();
  const isLeftTruth = truthCombinations.some(t => JSON.stringify(t.sort()) === JSON.stringify(left));
  const isRightTruth = truthCombinations.some(t => JSON.stringify(t.sort()) === JSON.stringify(right));
  const isLeftLie = lieCombinations.some(t => JSON.stringify(t.sort()) === JSON.stringify(left));
  const isRightLie = lieCombinations.some(t => JSON.stringify(t.sort()) === JSON.stringify(right));
  const label = document.getElementById('truthLieLabel');
  if (isLeftTruth && isRightLie) {
    label.innerHTML = '<span style="color: #00ff00">TRUTH</span><span style="color: #ff4444">LIE</span>'; label.style.display = 'flex'; label.style.justifyContent = 'space-between'; label.style.gap = '100px';
  } else if (isRightTruth && isLeftLie) {
    label.innerHTML = '<span style="color: #ff4444">LIE</span><span style="color: #00ff00">TRUTH</span>'; label.style.display = 'flex'; label.style.justifyContent = 'space-between'; label.style.gap = '100px';
  } else {
    alert('Could not match either side to a valid truth/lie combo.');
    label.textContent = '';
  }
  document.querySelectorAll('.dial-slot').forEach(slot => {
    if (slot.classList.contains('active')) slot.classList.add('locked');
  });
  const allSymbols = [...left, ...right];
  pulseMapSymbols(allSymbols);
}
    function resetDial() {
  document.querySelectorAll('.dial-slot').forEach(slot => {
    slot.style.backgroundImage = '';
    slot.classList.remove('active','locked');
    slot.style.boxShadow = 'none';
  });
    document.getElementById('map-overlay').innerHTML = '';
}

    const symbols = [
  'guardian.png', 'hive.png', 'kill.png', 'light.png', 'darkness.png',
  'drink.png', 'give.png', 'pyramid.png', 'savathun.png', 'stop.png',
  'traveller.png', 'witness.png', 'worm.png', 'worship.png'
];
    const leftGrid = document.getElementById('left-symbols');
    const rightGrid = document.getElementById('right-symbols');

    function createSymbol(img, group) {
  const div = document.createElement('div');
  div.className = 'symbol';
  div.style.backgroundImage = `url('./${img}')`;
  div.dataset.image = img;
  div.addEventListener('click', () => handleSymbolClick(div, group));
  return div;
}
    function handleSymbolClick(symbol, group) {
  const emptySlot = [...document.querySelectorAll('.dial-slot')].find(slot =>
    slot.dataset.position.includes(group) && !slot.style.backgroundImage
  );
  if (emptySlot) {
    emptySlot.style.backgroundImage = symbol.style.backgroundImage;
  }
}

    document.querySelectorAll('.dial-slot').forEach(slot => {
      slot.addEventListener('click', () => {
        if (slot.style.backgroundImage) {
          slot.classList.toggle('active');
          slot.style.boxShadow = slot.classList.contains('active')
            ? '0 0 12px 6px yellow'
            : 'none';
        }
      });
    });

    symbols.forEach(sym => {
      leftGrid.appendChild(createSymbol(sym, 'left'));
      rightGrid.appendChild(createSymbol(sym, 'right'));
    });
  </script>
</body>
</html>
